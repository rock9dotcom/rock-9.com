<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Rock9 | Claim Bonus</title>
<style>
:root{
--bg:#0e0907;
--panel:#16110e;
--line:rgba(255,255,255,0.08);
--text:#f6efe6;
--muted:rgba(246,239,230,0.7);
--gold:#f3bf53;
--red:#b91d14;
--radius:28px;
}

*{box-sizing:border-box;margin:0;padding:0}

body{
font-family:Arial,Helvetica,sans-serif;
background:linear-gradient(180deg,#0a0604,#120c09);
color:var(--text);
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
padding:24px;
overflow:hidden;
position:relative;
}

.coin-rain{
position:fixed;
inset:0;
pointer-events:none;
overflow:hidden;
z-index:0;
}

.coin{
position:absolute;
top:-120px;
width:22px;
height:22px;
border-radius:50%;
background:radial-gradient(circle at 30% 30%, #ffe7a3 0%, #f3bf53 45%, #c98512 100%);
box-shadow:0 0 12px rgba(243,191,83,0.45);
animation:fall linear infinite;
opacity:0.9;
}

.coin::after{
content:"";
position:absolute;
inset:4px;
border-radius:50%;
border:1px solid rgba(255,255,255,0.35);
}

@keyframes fall{
0%{transform:translateY(-120px) rotate(0deg);opacity:0}
10%{opacity:0.95}
100%{transform:translateY(120vh) rotate(360deg);opacity:0.2}
}

.top-popup{
position:fixed;
top:18px;
left:50%;
transform:translateX(-50%);
z-index:5;
background:rgba(18,12,9,0.96);
border:1px solid rgba(243,191,83,0.25);
color:var(--text);
padding:12px 18px;
border-radius:999px;
box-shadow:0 10px 28px rgba(0,0,0,0.35);
font-size:14px;
font-weight:700;
letter-spacing:0.2px;
backdrop-filter:blur(8px);
}

.top-popup .gold{
font-weight:900;
}

.top-popup .close-popup{
background:none;
border:none;
color:rgba(255,255,255,0.7);
font-size:18px;
margin-left:10px;
cursor:pointer;
line-height:1;
}

.wrap{width:min(980px,100%);position:relative;z-index:1}

.card{
background:var(--panel);
border:1px solid var(--line);
border-radius:32px;
overflow:hidden;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
}

.poster img{
width:100%;
height:100%;
object-fit:cover;
display:block;
}

.content{
padding:48px;
display:flex;
flex-direction:column;
justify-content:center;
}

.brand{
font-size:13px;
letter-spacing:1px;
color:var(--gold);
text-transform:uppercase;
margin-bottom:18px;
}

h1{
font-size:clamp(42px,6vw,72px);
line-height:1;
font-weight:900;
margin-bottom:18px;
}

.headline{
display:inline-block;
}

.headline .row{
display:flex;
white-space:nowrap;
}

.headline .top{
justify-content:flex-start;
}

.headline .bottom{
font-size:1.15em;
font-weight:900;
justify-content:center;
}

.headline .row{
display:flex;
align-items:baseline;
gap:0.35em;
white-space:nowrap;
}

.headline .bottom{
font-size:1.25em;
font-weight:900;
}

.get{
letter-spacing:2px;
}

.big{
font-size:inherit;
}

.line{
display:block;
width:100%;
}

.gold{color:var(--gold)}

.desc{
font-size:17px;
line-height:1.7;
color:var(--muted);
margin-bottom:28px;
max-width:420px;
}

.offer{
display:grid;
grid-template-columns:1fr 1fr;
gap:14px;
margin-bottom:28px;
}

.offer-box{
padding:18px;
border:1px solid var(--line);
border-radius:18px;
background:#1c1512;
}

.label{
font-size:12px;
text-transform:uppercase;
color:var(--muted);
margin-bottom:6px;
}

.value{
font-size:34px;
font-weight:900;
color:var(--gold);
}

.btn{
display:inline-flex;
align-items:center;
justify-content:center;
padding:16px 24px;
border-radius:999px;
text-decoration:none;
font-weight:800;
font-size:15px;
background:linear-gradient(180deg,#d73725,#a5160f);
color:#fff;
}

.note{
font-size:13px;
color:rgba(255,255,255,0.5);
margin-top:16px;
}

@media(max-width:860px){
.grid{grid-template-columns:1fr}
.poster{max-height:420px}
.content{padding:30px 22px}
.offer{grid-template-columns:1fr}
.btn{width:100%}
}
</style>
</head>
<body>
<div class="coin-rain" aria-hidden="true">
  <span class="coin" style="left:4%;animation-duration:8s;animation-delay:0s"></span>
  <span class="coin" style="left:10%;animation-duration:10s;animation-delay:1s;width:18px;height:18px"></span>
  <span class="coin" style="left:18%;animation-duration:7.5s;animation-delay:2s"></span>
  <span class="coin" style="left:26%;animation-duration:9s;animation-delay:0.5s;width:26px;height:26px"></span>
  <span class="coin" style="left:34%;animation-duration:11s;animation-delay:1.8s"></span>
  <span class="coin" style="left:42%;animation-duration:8.5s;animation-delay:2.5s;width:20px;height:20px"></span>
  <span class="coin" style="left:50%;animation-duration:9.5s;animation-delay:0.8s"></span>
  <span class="coin" style="left:58%;animation-duration:7.8s;animation-delay:2.2s;width:24px;height:24px"></span>
  <span class="coin" style="left:66%;animation-duration:10.5s;animation-delay:1.3s"></span>
  <span class="coin" style="left:74%;animation-duration:8.8s;animation-delay:0.2s;width:19px;height:19px"></span>
  <span class="coin" style="left:82%;animation-duration:9.8s;animation-delay:1.5s"></span>
  <span class="coin" style="left:90%;animation-duration:7.2s;animation-delay:2.8s;width:25px;height:25px"></span>
</div>

<div class="top-popup" id="topPopup">
  <span id="popupText">Jason just topped up <span class="gold">$100</span> and claimed <span class="gold">$250</span></span>
  <button class="close-popup" id="closePopup" aria-label="Close">×</button>
</div>

<div class="wrap">

<div class="card">
<div class="grid">

<div class="poster">
<img src="1002509001.png" alt="Rock9 Bonus" />
</div>

<div class="content">

<div class="brand">Rock9 Casino Bonus</div>

<h1 class="headline">
<div class="row top">Top Up <span class="gold">$100</span></div>
<div class="row bottom">Get <span class="gold big">$250</span></div>
</h1>



<a class="btn" href="https://wa.me/60123456789?text=Hi%20Rock9%2C%20I%20want%20to%20claim%20the%20%24100%20to%20%24250%20bonus." target="_blank" id="claimBtn">
Claim via WhatsApp
</a>

<p class="note">
Auto redirecting to WhatsApp in 5 seconds. Edit the WhatsApp number in the link before publishing.
</p>

</div>
</div>
</div>

</div>

<script>
const whatsappUrl = "https://wa.me/60123456789?text=Hi%20Rock9%2C%20I%20want%20to%20claim%20the%20%24100%20to%20%24250%20bonus.";
document.getElementById('claimBtn').href = whatsappUrl;
setTimeout(function(){
  window.location.href = whatsappUrl;
}, 5000);

const popup = document.getElementById('topPopup');
const closePopup = document.getElementById('closePopup');
const popupText = document.getElementById('popupText');

const names = [
  'Jason', 'Daniel', 'Ryan', 'Kevin', 'Marcus', 'Brandon', 'Ethan', 'Chris',
  'Alex', 'Justin', 'Nathan', 'Dylan', 'Aaron', 'Sean', 'Adrian', 'Leon',
  'Adam', 'Joshua', 'Samuel', 'Jayden'
];

function randomName() {
  return names[Math.floor(Math.random() * names.length)];
}

function updatePopup() {
  popupText.innerHTML = `${randomName()} just topped up <span class="gold">$100</span> and claimed <span class="gold">$250</span>`;
}

updatePopup();
setInterval(updatePopup, 3200);

if (closePopup) {
  closePopup.addEventListener('click', function(){
    popup.style.display = 'none';
  });
}
</script>

</body>
</html>
