<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Rock9.com — Free Credits</title>

<style>
:root{
  --bg:#360904;
  --gold:#F9C220;
  --gold2:#F8E7B7;
  --orange:#D74A09;
}

*{box-sizing:border-box;font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial;}

body{
  margin:0;
  color:var(--gold2);
  background:
    radial-gradient(900px 500px at 20% 0%, rgba(215,74,9,.5), transparent 60%),
    radial-gradient(900px 500px at 85% 25%, rgba(249,194,32,.35), transparent 55%),
    linear-gradient(180deg, #1a0403 0%, var(--bg) 40%, #120202 100%);
  overflow-x:hidden;
}

/* ===== COIN RAIN ===== */
.coin-rain{
  position:fixed;
  inset:0;
  overflow:hidden;
  pointer-events:none;
  z-index:0;
}
.coin{
  position:absolute;
  top:-80px;
  width:22px;
  height:22px;
  border-radius:50%;
  background: radial-gradient(circle at 30% 30%, var(--gold2), var(--gold) 45%, var(--orange) 95%);
  box-shadow:0 0 10px rgba(249,194,32,.6);
  animation: fall linear infinite;
  opacity:.9;
}
@keyframes fall{
  0%{ transform: translateY(0) rotate(0deg); }
  100%{ transform: translateY(115vh) rotate(720deg); }
}

/* ===== LAYOUT ===== */
.wrap{
  max-width:980px;
  margin:auto;
  padding:10px 16px 46px;   /* tight top */
  position:relative;
  z-index:2;
  text-align:center;
}

/* Logo (tight with title) */
.brandLogo{
  width:min(520px, 92vw);
  height:auto;
  display:block;
  margin:0 auto -10px;        /* NEGATIVE margin pulls title closer */
  filter: drop-shadow(0 18px 35px rgba(0,0,0,.55));
}

/* Title */
.heroTitle{
  margin:0;
  line-height:0.10;          /* tight */
  font-weight:1000;
  letter-spacing:.4px;
  font-size:26px;
  text-transform:uppercase;
  background:linear-gradient(180deg,var(--gold2),var(--gold));
  -webkit-background-clip:text;
  color:transparent;
}
.heroSub{
  margin:4px 0 12px;         /* tight */
  color:rgba(248,231,183,.85);
  font-size:14px;
}

/* Poster */
.posterCard{
  margin:0 auto 14px;
  max-width:820px;
  border-radius:22px;
  overflow:hidden;
  border:1px solid rgba(248,231,183,.20);
  background:rgba(0,0,0,.25);
  box-shadow:0 20px 60px rgba(0,0,0,.6);
}
.posterImg{
  width:100%;
  height:auto;
  display:block;
}

/* CTA Card */
.card{
  max-width:820px;
  margin:0 auto;
  background:rgba(0,0,0,.25);
  border:1px solid rgba(248,231,183,.25);
  border-radius:22px;
  padding:18px 16px 16px;
  box-shadow:0 20px 60px rgba(0,0,0,.6);
}

.points{
  margin:0 0 14px;
  padding:0;
  list-style:none;
  display:flex;
  flex-wrap:wrap;
  gap:10px;
  justify-content:center;
}
.points li{
  font-size:13px;
  padding:8px 10px;
  border-radius:14px;
  border:1px solid rgba(248,231,183,.16);
  background:rgba(0,0,0,.18);
  color:rgba(248,231,183,.90);
}

/* ===== BUTTON (Clean Premium Gold – Not Weird) ===== */
.whBtn{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  text-decoration:none;
  font-weight:1000;
  padding:16px 22px;
  border-radius:20px;
  border:1px solid rgba(248,231,183,.40);
  color:#2b1600;
  font-size:15px;
  background:
    radial-gradient(120% 180% at 50% 0%,
      rgba(248,231,183,.95),
      rgba(249,194,32,.95) 45%,
      rgba(215,74,9,.25) 100%);
  box-shadow:
    0 20px 50px rgba(249,194,32,.35),
    inset 0 1px 0 rgba(255,255,255,.35);
  transition: transform .15s ease, box-shadow .15s ease, filter .15s ease;
}
.whBtn:hover{
  transform: translateY(-2px);
  box-shadow:
    0 28px 70px rgba(249,194,32,.45),
    inset 0 1px 0 rgba(255,255,255,.40);
}
.whBtn:active{
  transform: translateY(1px);
  filter: brightness(.98);
}

/* subtle CTA pulse (safe + not ugly) */
@keyframes softPulse{
  0%,100%{ filter: drop-shadow(0 0 0 rgba(249,194,32,0)); }
  50%{ filter: drop-shadow(0 0 14px rgba(249,194,32,.22)); }
}
.whBtn{ animation: softPulse 2.8s ease-in-out infinite; }

.small{
  font-size:11px;
  margin-top:10px;
  opacity:.75;
  color:rgba(248,231,183,.75);
}

/* ===== SINGLE TOAST (TOP CENTER) ===== */
.live-toasts{
  position: fixed;
  top: 6px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 5;
  pointer-events: none;
}
.toast{
  width: min(440px, calc(100vw - 24px));
  padding: 8px 12px;
  border-radius: 14px;
  border: 1px solid rgba(248,231,183,.22);
  background: linear-gradient(180deg, rgba(0,0,0,.62), rgba(0,0,0,.25));
  box-shadow: 0 18px 45px rgba(0,0,0,.55);
  backdrop-filter: blur(6px);
  display: grid;
  grid-template-columns: 34px 1fr;
  gap: 8px;
  align-items: center;
  animation: fadeIn .3s ease;
}
@keyframes fadeIn{
  from{opacity:0; transform:translateY(-8px);}
  to{opacity:1; transform:translateY(0);}
}
.coinBadge{
  width:34px;
  height:34px;
  border-radius:12px;
  background: radial-gradient(circle at 30% 30%, var(--gold2), var(--gold) 45%, var(--orange) 95%);
  box-shadow:0 0 12px rgba(249,194,32,.20);
}
.toastTitleRow{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:10px;
}
.toastTitle{
  font-weight:900;
  font-size:12px;
  margin:0;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}
.toastTime{
  font-size:10px;
  opacity:.7;
  margin:0;
  flex:0 0 auto;
}
.toastSub{
  margin:1px 0 0;
  font-size:11px;
  opacity:.82;
}
.tagLive{
  font-size:9px;
  padding:2px 5px;
  border-radius:999px;
  background:rgba(215,74,9,.25);
  margin-left:4px;
}
</style>
</head>

<body>
<div class="coin-rain" id="coinRain" aria-hidden="true"></div>
<div class="live-toasts" id="liveToasts" aria-hidden="true"></div>

<div class="wrap">
  <!-- MUST exist in same folder -->
  <img class="brandLogo" src="Logo-Rectangle.png" alt="Rock9 Logo">

  <h1 class="heroTitle">Free Credits</h1>
  <div class="heroSub">Sign up now — contact WhatsApp support to claim your promotional credits.</div>

  <!-- Poster (must exist in same folder) -->
  <div class="posterCard">
    <img class="posterImg" src="free-credits-sign-up.jpg" alt="Free Credits Poster">
  </div>

  <div class="card">
    <ul class="points">
    </ul>

    <a id="waBtnTop" class="whBtn" href="#" target="_blank" rel="noopener">
      WhatsApp Now (Claim Free Credits)
    </a>

    <div class="small">Official Rock9 WhatsApp Support</div>
  </div>
</div>

<script>
/* =========================
   WhatsApp + Auto Redirect (5s)
========================= */
const WA_NUMBER = "60123456789"; // CHANGE THIS (no +)
const msg = "Hi Rock9.com, I want to claim the FREE CREDITS. Please help me sign up.";
const waLink = `https://wa.me/${WA_NUMBER}?text=${encodeURIComponent(msg)}`;

const waBtn = document.getElementById("waBtnTop");
waBtn.href = waLink;

let userClicked = false;
waBtn.addEventListener("click", () => { userClicked = true; });

setTimeout(() => {
  if (!userClicked) window.location.href = waLink;
}, 5000);

/* =========================
   Coin Rain
========================= */
const rain = document.getElementById("coinRain");
function createCoin(){
  const c = document.createElement("div");
  c.className = "coin";
  c.style.left = Math.random() * 100 + "vw";
  c.style.animationDuration = (3 + Math.random() * 4) + "s";
  c.style.opacity = (0.45 + Math.random() * 0.5).toFixed(2);
  const size = (14 + Math.random() * 24).toFixed(0) + "px";
  c.style.width = c.style.height = size;
  rain.appendChild(c);
  setTimeout(() => c.remove(), 7000);
}
setInterval(createCoin, 180);

/* =========================
   Single Toast + Timestamp
========================= */
const container = document.getElementById("liveToasts");
const names = ["Ahmad","Jason","Kelvin","Wei Jie","Jun Hao","Siti","Alya","Daniel","Haziq","Aiman"];
const amounts = [10,15,20,30,50,80,100,120];

function mask(n){ return n.slice(0,2) + "***"; }
function pick(a){ return a[Math.floor(Math.random() * a.length)]; }
function now(){ return new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}); }

function showToast(){
  container.innerHTML = "";
  const t = document.createElement("div");
  t.className = "toast";
  t.innerHTML = `
    <div class="coinBadge"></div>
    <div>
      <div class="toastTitleRow">
        <p class="toastTitle">${mask(pick(names))} claimed ${pick(amounts)} credits <span class="tagLive">LIVE</span></p>
        <p class="toastTime">${now()}</p>
      </div>
      <p class="toastSub">Sign up support completed successfully</p>
    </div>`;
  container.appendChild(t);
  setTimeout(() => { container.innerHTML = ""; }, 3000);
}
setTimeout(showToast, 900);
setInterval(showToast, 4200);
</script>

</body>
</html>
