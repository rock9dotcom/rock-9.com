<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Rock9 | Claim Bonus</title>
<style>
:root{
--bg:#0e0907;
--panel:#16110e;
--line:rgba(255,255,255,0.08);
--text:#f6efe6;
--muted:rgba(246,239,230,0.7);
--gold:#f3bf53;
--red:#b91d14;
--radius:28px;
}

*{box-sizing:border-box;margin:0;padding:0}

body{
font-family:Arial,Helvetica,sans-serif;
background:linear-gradient(180deg,#0a0604,#120c09);
color:var(--text);
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
padding:24px;
}

.wrap{width:min(980px,100%)}

.card{
background:var(--panel);
border:1px solid var(--line);
border-radius:32px;
overflow:hidden;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
}

.poster img{
width:100%;
height:100%;
object-fit:cover;
display:block;
}

.content{
padding:48px;
display:flex;
flex-direction:column;
justify-content:center;
}

.brand{
font-size:13px;
letter-spacing:1px;
color:var(--gold);
text-transform:uppercase;
margin-bottom:18px;
}

h1{
font-size:clamp(42px,6vw,72px);
line-height:1;
font-weight:900;
margin-bottom:18px;
display:flex;
flex-direction:column;
}

.line{
display:block;
width:100%;
}

.gold{color:var(--gold)}

.desc{
font-size:17px;
line-height:1.7;
color:var(--muted);
margin-bottom:28px;
max-width:420px;
}

.offer{
display:grid;
grid-template-columns:1fr 1fr;
gap:14px;
margin-bottom:28px;
}

.offer-box{
padding:18px;
border:1px solid var(--line);
border-radius:18px;
background:#1c1512;
}

.label{
font-size:12px;
text-transform:uppercase;
color:var(--muted);
margin-bottom:6px;
}

.value{
font-size:34px;
font-weight:900;
color:var(--gold);
}

.btn{
display:inline-flex;
align-items:center;
justify-content:center;
padding:16px 24px;
border-radius:999px;
text-decoration:none;
font-weight:800;
font-size:15px;
background:linear-gradient(180deg,#d73725,#a5160f);
color:#fff;
}

.note{
font-size:13px;
color:rgba(255,255,255,0.5);
margin-top:16px;
}

@media(max-width:860px){
.grid{grid-template-columns:1fr}
.poster{max-height:420px}
.content{padding:30px 22px}
.offer{grid-template-columns:1fr}
.btn{width:100%}
}
</style>
</head>
<body>

<div class="wrap">

<div class="card">
<div class="grid">

<div class="poster">
<img src="1002509001.png" alt="Rock9 Bonus" />
</div>

<div class="content">

<div class="brand">Rock9 Casino Bonus</div>

<h1>
<span class="line">Top Up <span class="gold">$100</span></span>
<span class="line">Get <span class="gold">$250</span></span>
</h1>



<a class="btn" href="https://wa.me/60123456789?text=Hi%20Rock9%2C%20I%20want%20to%20claim%20the%20%24100%20to%20%24250%20bonus." target="_blank" id="claimBtn">
Claim via WhatsApp
</a>

<p class="note">
Auto redirecting to WhatsApp in 5 seconds. Edit the WhatsApp number in the link before publishing.
</p>

</div>
</div>
</div>

</div>

<script>
const whatsappUrl = "https://wa.me/60123456789?text=Hi%20Rock9%2C%20I%20want%20to%20claim%20the%20%24100%20to%20%24250%20bonus.";
document.getElementById('claimBtn').href = whatsappUrl;
setTimeout(function(){
  window.location.href = whatsappUrl;
}, 5000);
</script>

</body>
</html>
