<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Rock9.com — Free Credits</title>

<style>
:root{
  --bg:#360904;
  --gold:#F9C220;
  --gold2:#F8E7B7;
  --orange:#D74A09;
}

*{box-sizing:border-box;font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial;}

body{
  margin:0;
  color:var(--gold2);
  background:
    radial-gradient(900px 500px at 20% 0%, rgba(215,74,9,.5), transparent 60%),
    radial-gradient(900px 500px at 85% 25%, rgba(249,194,32,.35), transparent 55%),
    linear-gradient(180deg, #1a0403 0%, var(--bg) 40%, #120202 100%);
  overflow-x:hidden;
}

/* ===== COIN RAIN ===== */
.coin-rain{
  position:fixed;
  inset:0;
  overflow:hidden;
  pointer-events:none;
  z-index:0;
}
.coin{
  position:absolute;
  top:-80px;
  width:22px;
  height:22px;
  border-radius:50%;
  background: radial-gradient(circle at 30% 30%, var(--gold2), var(--gold) 45%, var(--orange) 95%);
  box-shadow:0 0 10px rgba(249,194,32,.6);
  animation: fall linear infinite;
  opacity:.9;
}
@keyframes fall{
  0%{ transform: translateY(0) rotate(0deg); }
  100%{ transform: translateY(115vh) rotate(720deg); }
}

/* ===== LAYOUT ===== */
.wrap{
  max-width:980px;
  margin:auto;
  padding:10px 16px 46px;
  position:relative;
  z-index:2;
  text-align:center;
}

/* LOGO */
.brandLogo{
  width:min(520px, 92vw);
  display:block;
  margin:0 auto -6px;
  filter: drop-shadow(0 18px 35px rgba(0,0,0,.55));
}

/* BUTTON */
.whBtn{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  text-decoration:none;
  font-weight:1000;
  padding:16px 24px;
  border-radius:22px;
  border:1px solid rgba(248,231,183,.40);
  color:#2b1600;
  font-size:15px;
  margin:10px 0 14px;
  background:
    radial-gradient(120% 180% at 50% 0%,
      rgba(248,231,183,.95),
      rgba(249,194,32,.95) 45%,
      rgba(215,74,9,.25) 100%);
  box-shadow:
    0 20px 50px rgba(249,194,32,.35),
    inset 0 1px 0 rgba(255,255,255,.35);
  transition: all .2s ease;
}
.whBtn:hover{
  transform: translateY(-2px);
  box-shadow:
    0 28px 70px rgba(249,194,32,.45),
    inset 0 1px 0 rgba(255,255,255,.40);
}

/* TITLE */
.heroTitle{
  margin:0;
  line-height:1.02;
  font-weight:1000;
  font-size:26px;
  text-transform:uppercase;
  background:linear-gradient(180deg,var(--gold2),var(--gold));
  -webkit-background-clip:text;
  color:transparent;
}

.heroSub{
  margin:4px 0 12px;
  font-size:14px;
}

/* Poster */
.posterCard{
  margin:0 auto 14px;
  max-width:820px;
  border-radius:22px;
  overflow:hidden;
  border:1px solid rgba(248,231,183,.20);
  background:rgba(0,0,0,.25);
  box-shadow:0 20px 60px rgba(0,0,0,.6);
}
.posterImg{
  width:100%;
  display:block;
}

/* ===== TOAST ===== */
.live-toasts{
  position: fixed;
  top: 6px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 5;
  pointer-events: none;
}
.toast{
  width: min(420px, calc(100vw - 24px));
  padding: 8px 12px;
  border-radius: 14px;
  border: 1px solid rgba(248,231,183,.22);
  background: linear-gradient(180deg, rgba(0,0,0,.62), rgba(0,0,0,.25));
  box-shadow: 0 18px 45px rgba(0,0,0,.55);
  display: grid;
  grid-template-columns: 34px 1fr;
  gap: 8px;
  align-items: center;
}
.coinBadge{
  width:34px;
  height:34px;
  border-radius:12px;
  background: radial-gradient(circle at 30% 30%, var(--gold2), var(--gold) 45%, var(--orange) 95%);
}
.toastTitle{font-weight:900;font-size:12px;margin:0;}
.toastSub{font-size:11px;margin:0;}
.toastTime{font-size:10px;opacity:.7;}
.tagLive{font-size:9px;padding:2px 5px;border-radius:999px;background:rgba(215,74,9,.25);margin-left:4px;}
</style>
</head>

<body>

<div class="coin-rain" id="coinRain"></div>
<div class="live-toasts" id="liveToasts"></div>

<div class="wrap">

  <img class="brandLogo" src="Logo-Rectangle.png" alt="Rock9 Logo">

  <!-- BUTTON NOW ABOVE TITLE -->
  <a id="waBtnTop" class="whBtn" href="#" target="_blank">
    Claim Free Credits Now
  </a>

  <h1 class="heroTitle">Free Credits</h1>
  <div class="heroSub">Sign up now — click the button to claim your credits.</div>

  <div class="posterCard">
    <img class="posterImg" src="free-credits-sign-up.jpg" alt="Free Credits Poster">
  </div>

</div>

<script>
const WA_NUMBER="61411635156";
const msg="Hi Rock9.com, I want to claim the FREE CREDITS.";
const waLink=`https://wa.me/${WA_NUMBER}?text=${encodeURIComponent(msg)}`;
const waBtn=document.getElementById("waBtnTop");
waBtn.href=waLink;

/* Auto Redirect 5s */
let userClicked=false;
waBtn.addEventListener("click",()=>{userClicked=true;});
setTimeout(()=>{ if(!userClicked){ window.location.href=waLink; } },10000);

/* Coin Rain */
const rain=document.getElementById("coinRain");
function createCoin(){
  const c=document.createElement("div");
  c.className="coin";
  c.style.left=Math.random()*100+"vw";
  c.style.animationDuration=(3+Math.random()*4)+"s";
  c.style.opacity=.5+Math.random()*.5;
  c.style.width=c.style.height=(15+Math.random()*25)+"px";
  rain.appendChild(c);
  setTimeout(()=>c.remove(),7000);
}
setInterval(createCoin,180);

/* Toast */
const container=document.getElementById("liveToasts");
const names=["Zane","Ives","Victoria","Joseph","Hayden","Angelina","Neville","Charli","Jesse","Jageurs","Sean","Charlotte","Julian","Rebecca","Makayla"];
const amounts=[50,80,120,150,200,250,300,500,800,1000,1200,1500,1800,2000];
function mask(n){return n.slice(0,2)+"***";}
function pick(a){return a[Math.floor(Math.random()*a.length)];}
function now(){return new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});}
function showToast(){
  container.innerHTML="";
  const t=document.createElement("div");
  t.className="toast";
  t.innerHTML=`
    <div class="coinBadge"></div>
    <div>
      <p class="toastTitle">${mask(pick(names))} claimed ${pick(amounts)} credits <span class="tagLive">LIVE</span></p>
      <p class="toastTime">${now()}</p>
      <p class="toastSub">Sign up completed</p>
    </div>`;
  container.appendChild(t);
  setTimeout(()=>{container.innerHTML="";},3000);
}
setTimeout(showToast,900);
setInterval(showToast,4200);
</script>

</body>
</html>
